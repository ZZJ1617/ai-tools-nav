<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>赛博上片指南 · AI创作工具导航</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #ffffff; --bg-alt: #f6f5f4; --surface: #ffffff;
  --text: rgba(0,0,0,0.9); --text2: #615d59; --text3: #a39e98; --text4: #c4bfb8;
  --brand: #0075de; --brand-hover: #005bab;
  --border: rgba(0,0,0,0.1); --border-hover: rgba(0,0,0,0.2);
  --shadow: 0 4px 18px rgba(0,0,0,0.04),0 2px 7.85px rgba(0,0,0,0.027),0 0.8px 2.93px rgba(0,0,0,0.02);
  --badge-bg: #f2f9ff; --badge-text: #097fe8;
  --link-bg: #f2f9ff; --link-border: rgba(0,117,222,0.2); --link-hover-bg: #0075de; --link-hover-text: #fff;
  --disabled-bg: #f0efee; --disabled-text: #a39e98; --disabled-border: rgba(0,0,0,0.05);
  --toggle-bg: #f0efee; --toggle-icon: '🌙';
}
[data-theme="dark"] {
  --bg: #08090a; --bg-alt: #0f1011; --surface: #191a1b;
  --text: #f7f8f8; --text2: #d0d6e0; --text3: #8a8f98; --text4: #62666d;
  --brand: #5e6ad2; --brand-hover: #7170ff;
  --border: rgba(255,255,255,0.1); --border-hover: rgba(255,255,255,0.2);
  --shadow: none;
  --badge-bg: rgba(94,106,210,0.15); --badge-text: #7170ff;
  --link-bg: rgba(94,106,210,0.15); --link-border: rgba(94,106,210,0.3); --link-hover-bg: #5e6ad2; --link-hover-text: #fff;
  --disabled-bg: rgba(255,255,255,0.03); --disabled-text: #62666d; --disabled-border: rgba(255,255,255,0.05);
  --toggle-bg: #23252a; --toggle-icon: '☀️';
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Inter', -apple-system, system-ui, sans-serif;
  background: var(--bg); color: var(--text2); line-height:1.6; transition:background 0.3s;
}
.container { max-width:1200px; margin:0 auto; padding:0 24px; }

/* Theme Toggle */
.theme-bar { display:flex; justify-content:flex-end; padding:16px 24px; }
.theme-btn {
  padding:6px 16px; border-radius:9999px; font-size:14px; font-weight:500;
  background:var(--toggle-bg); border:1px solid var(--border); color:var(--text2);
  cursor:pointer; transition:all 0.2s; display:flex; align-items:center; gap:6px;
  font-family:inherit;
}
.theme-btn:hover { border-color:var(--brand); }

header { padding:48px 0 40px; text-align:center; }
header h1 {
  font-size:40px; font-weight:700; color:var(--text);
  letter-spacing:-1.2px; line-height:1.2; margin-bottom:12px;
}
header p { font-size:18px; color:var(--text3); }
header .count {
  display:inline-block; margin-top:14px; padding:6px 20px;
  background:var(--badge-bg); border-radius:9999px;
  font-size:14px; font-weight:600; color:var(--badge-text);
}

.search-wrap { margin-bottom:20px; }
.search-wrap input {
  width:100%; padding:14px 20px; font-size:16px; color:var(--text);
  background:var(--surface); border:1px solid var(--border); border-radius:12px;
  font-family:inherit; outline:none; transition:border-color 0.2s; box-shadow:var(--shadow);
}
.search-wrap input:focus { border-color:var(--brand); }
.search-wrap input::placeholder { color:var(--text4); }

.filters-wrap { margin-bottom:40px; overflow-x:auto; -webkit-overflow-scrolling:touch; }
.filters-wrap::-webkit-scrollbar { height:0; }
.filters { display:flex; gap:8px; white-space:nowrap; min-width:max-content; }
.filter-pill {
  padding:6px 18px; border-radius:9999px; font-size:14px; font-weight:500;
  color:var(--text2); background:transparent; border:1px solid var(--border);
  cursor:pointer; transition:all 0.15s; user-select:none; flex-shrink:0;
}
.filter-pill:hover { border-color:var(--text3); }
.filter-pill.active { color:#fff; background:var(--brand); border-color:var(--brand); }

.grid { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; }
@media (max-width:900px) { .grid { grid-template-columns:repeat(2,1fr); } }
@media (max-width:600px) { .grid { grid-template-columns:1fr; } header h1 { font-size:28px; letter-spacing:-0.6px; } }
.card {
  background:var(--surface); border:1px solid var(--border); border-radius:12px;
  padding:28px; box-shadow:var(--shadow); transition:all 0.2s; display:flex; flex-direction:column;
}
.card:hover { border-color:var(--border-hover); transform:translateY(-2px); box-shadow:0 8px 30px rgba(0,0,0,0.08); }
[data-theme="dark"] .card:hover { box-shadow:0 0 0 1px rgba(94,106,210,0.2); }
.card-name { font-size:20px; font-weight:700; color:var(--text); margin-bottom:8px; letter-spacing:-0.2px; }
.card-cat {
  display:inline-block; padding:4px 14px; border-radius:9999px;
  font-size:13px; font-weight:600; color:var(--badge-text); background:var(--badge-bg);
  margin-bottom:10px; align-self:flex-start; letter-spacing:0.1px;
}
.card-stars { font-size:14px; color:#f5a623; margin-bottom:12px; }
.card-desc { font-size:15px; color:var(--text2); line-height:1.7; margin-bottom:18px; flex:1; }
.card-link {
  display:inline-block; padding:8px 20px; border-radius:6px;
  font-size:14px; font-weight:600; text-align:center;
  background:var(--link-bg); border:1px solid var(--link-border); color:var(--brand);
  text-decoration:none; transition:all 0.15s; align-self:flex-start;
}
.card-link:hover { background:var(--link-hover-bg); border-color:var(--link-hover-bg); color:var(--link-hover-text); }
.card-link.disabled {
  background:var(--disabled-bg); border:1px solid var(--disabled-border);
  color:var(--disabled-text); pointer-events:none; cursor:not-allowed;
}
.hidden { display:none !important; }

/* Hotspot */
.hotspot { margin-bottom:36px; }
.hotspot-header { display:flex; align-items:center; gap:10px; margin-bottom:16px; }
.hotspot-dot { width:8px; height:8px; background:#f56c6c; border-radius:50%; animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.hotspot-title { font-size:18px; font-weight:600; color:var(--text); }
.hotspot-date { font-size:13px; color:var(--text4); }
.hotspot-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
@media (max-width:900px) { .hotspot-grid { grid-template-columns:repeat(2,1fr); } }
@media (max-width:600px) { .hotspot-grid { grid-template-columns:1fr; } }
.hotspot-card {
  background:var(--badge-bg); border:1px solid var(--border); border-radius:10px;
  padding:14px 18px; font-size:14px; color:var(--text2); line-height:1.6;
}
.hotspot-card strong { color:var(--brand); }

footer { text-align:center; padding:64px 0 56px; background:var(--bg-alt); margin-top:80px; }
footer h2 { font-size:22px; font-weight:600; color:var(--text); margin-bottom:10px; }
footer p { font-size:15px; color:var(--text3); max-width:420px; margin:0 auto; }
footer .qrcode-hint { margin-top:18px; padding:12px 28px; background:var(--surface); border-radius:12px; display:inline-block; border:1px solid var(--border); box-shadow:var(--shadow); }
footer .qrcode-hint span { color:var(--brand); font-weight:700; }
</style>
</head>
<body>
<div class="theme-bar container">
  <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">🌙 暗色模式</button>
</div>

<header class="container">
  <h1>赛博上片指南 · AI创作工具导航</h1>
  <p>每日精选AI创作工具，覆盖视频生成 · 图像生成 · 设计工具 · 3D创作</p>
  <div class="count">📰 已收录 <span id="toolCount">0</span> 个工具，持续更新</div>
</header>

<div class="container">
  <!-- 🔴 今日AI工具热点 -->
  <div class="hotspot" id="hotspot"></div>

  <div class="search-wrap">
    <input type="text" id="search" placeholder="搜索工具名或关键词…" autocomplete="off">
  </div>
  <div class="filters-wrap"><div class="filters" id="filters"></div></div>
  <div class="grid" id="grid"></div>
</div>

<footer>
  <h2>关注「赛博上片指南」公众号</h2>
  <p>每天早上获取最新AI创作工具推荐，以上工具均来自每日日报精选</p>
  <div class="qrcode-hint">🔍 微信搜索 <span>赛博上片指南</span> 关注</div>
  <p style="margin-top:18px; font-size:14px; color:var(--text3);">
    回复 <span style="color:var(--brand); font-weight:700;">「工具」</span> 获取完整AI创作工具导航页
  </p>
</footer>

<script>
// Theme toggle
function toggleTheme() {
  const html = document.documentElement;
  const btn = document.getElementById('themeBtn');
  if (html.dataset.theme === 'dark') {
    html.dataset.theme = 'light';
    btn.innerHTML = '🌙 暗色模式';
    localStorage.setItem('theme', 'light');
  } else {
    html.dataset.theme = 'dark';
    btn.innerHTML = '☀️ 浅色模式';
    localStorage.setItem('theme', 'dark');
  }
}
// Load saved theme
(function() {
  const saved = localStorage.getItem('theme');
  if (saved === 'dark') {
    document.documentElement.dataset.theme = 'dark';
    document.getElementById('themeBtn').innerHTML = '☀️ 浅色模式';
  }
})();

const HOTSPOT = {
  date:"6月17日 更新",
  items:[
    {
        "t": "🤖",
        "h": "Grok V9-Medium/Cursor",
        "d": "1.5万亿参数通用大模型预览，超10万GPU从零训练，未来几周发布"
    }
]
};

function renderHotspot(){
  if(!HOTSPOT.items.length) return;
  const h=document.getElementById('hotspot');
  const cards=HOTSPOT.items.map(i=>`<div class="hotspot-card"><strong>${i.t} ${i.h}</strong> — ${i.d}</div>`).join('');
  h.innerHTML=`<div class="hotspot-header"><div class="hotspot-dot"></div><span class="hotspot-title">🔴 今日AI工具热点</span><span class="hotspot-date">${HOTSPOT.date}</span></div><div class="hotspot-grid">${cards}</div>`;
}
renderHotspot();

const TOOLS = [
  {n:"Kling 3.0/可灵",c:"视频生成",d:"快手AI视频生成，4K/60fps",u:"https://klingai.com",r:4},
  {n:"Veo 3.1",c:"视频生成",d:"Google视频生成，原生音频+4K",u:"https://deepmind.google/technologies/veo/",r:3},
  {n:"Seedance 2.0",c:"视频生成",d:"字节多模态视频模型，12路参考输入，1080p 🇨🇳",u:"https://seed.bytedance.com/zh/seedance2_0",r:3},
  {n:"Seedance 3.0",c:"视频生成",d:"字节下一代视频模型，1小时长视频+多语情感配音 🇨🇳",u:"https://seed.bytedance.com/",r:3},
  {n:"JoyAI-Echo",c:"视频生成",d:"京东开源5分钟长视频生成框架 🇨🇳",u:"https://github.com/jd-opensource/joyai-echo",r:2},
  {n:"P-Video-Avatar",c:"视频生成",d:"Pruna AI单张照片生成动态数字人，10秒出片",u:"https://www.scenario.com/blog/meet-p-video-avatar",r:2},
  {n:"Midjourney",c:"图像生成",d:"V8.1速度提升4-5倍+首款视频模型V1",u:"https://www.midjourney.com",r:5},
  {n:"Z-Image",c:"图像生成",d:"阿里通义开源60亿参数图像生成器 🇨🇳",u:"https://zimage.design/zh/",r:3},
  {n:"Raphael AI",c:"图像生成",d:"全球首个无限免费AI图像生成器",u:"https://raphael.app/zh",r:3},
  {n:"Imagen 4 Ultra",c:"图像生成",d:"Google真实感最强图像API",u:"https://deepmind.google/technologies/imagen/",r:3},
  {n:"Ideogram 4.0",c:"图像生成",d:"开源93亿参数，文字渲染准确率超越800亿大模型",u:"https://ideogram.ai/",r:4},
  {n:"Reve 2.0",c:"图像生成",d:"4K原生图像模型，布局式精确控制，全球第2",u:"https://www.reve.com",r:4},
  {n:"Figma",c:"设计工具",d:"全面推出AI设计功能，1万积分免费",u:"https://www.figma.com",r:4},
  {n:"Pixso",c:"设计工具",d:"国内设计协作平台，AI智能设计 🇨🇳",u:"https://pixso.cn",r:3},
  {n:"Felo AI Designer",c:"设计工具",d:"8+模型集成，30秒出稿",u:"https://felo.ai",r:2},
  {n:"Genspark AI Design",c:"设计工具",d:"每天100免费积分，16+设计类别",u:"https://www.genspark.ai",r:3},
  {n:"Open Design 0.9.0",c:"设计工具",d:"Claude Design开源替代，155个Skill系统",u:"https://open-design.ai/zh/",r:2},
  {n:"Lovart",c:"设计工具",d:"多模态AI设计Agent · 🔒 需邀请码，80万人排队",u:"",r:2},
  {n:"腾讯Ardot",c:"设计工具",d:"腾讯AI设计智能体公测，一句话生成可编辑UI 🇨🇳",u:"https://ardot.tencent.com/",r:3},
  {n:"Mew Design",c:"设计工具",d:"自然语言驱动的免费AI设计生成器 🇨🇳",u:"https://mew.design/zh",r:2},
  {n:"Meshy 3D Agent",c:"3D创作",d:"全球首个3D创作AI Agent，多轮对话产出整套3D资产",u:"https://www.meshy.ai/",r:3},
  {n:"Runway Aleph 2.0",c:"视频编辑",d:"编辑一帧自动应用全片",u:"https://runwayml.com",r:4},
  {n:"Subvideo.ai",c:"字幕配音",d:"AI配音+字幕一体化，Whisper精准转录，40+语言 🇨🇳",u:"https://subvideo.ai/zh/",r:2},
  {n:"Vibbit",c:"短视频创作",d:"AI Agent + 57个工具短视频平台",u:"https://vibbit.ai/zh-CN",r:2},
  {n:"LumenX Studio",c:"短视频创作",d:"阿里开源AI短漫剧全链路自动化平台 🇨🇳",u:"https://github.com/alibaba/LumenX",r:2},
  {n:"OiiOii 2.0",c:"短视频创作",d:"国产AI视频创作Agent，智能画布+拉片复刻 🇨🇳",u:"https://oiioii.ai",r:3},
  {n:"腾讯Miora",c:"创意智能体",d:"腾讯全场景创意智能体工作室 · 🔒 需邀请码排期 🇨🇳",u:"",r:2},
  {n:"ElevenCreative Flows Agent",c:"创意工作流",d:"50+模型画布式视频工作流",u:"https://elevenlabs.io/app/flows",r:3},
  {n:"Felo Video",c:"文档转视频",d:"文档/网页转视频，10分钟出片",u:"https://felo.ai",r:2},
  {n:"Colossyan Cora",c:"企业AI视频",d:"企业培训视频Agent · 💰 14天试用后$27/月",u:"https://www.colossyan.com",r:2},
  {n:"Utopai PAI 2.0",c:"叙事视频",d:"AI叙事视频平台 · 💰 仅限订阅，无免费层",u:"https://pai.utopaistudios.com",r:2},
  {n:"ComfyUI",c:"工作流工具",d:"节点式AI工作流，v0.24.0新增Flux2/Grok节点",u:"https://comfy.org",r:4},
  {n:"Grok Imagine",c:"多模态生成",d:"xAI图片+视频+音频统一API",u:"https://grok.com/imagine",r:4},
  {n:"Adobe CC 6月更新",c:"设计工具",d:"PS/AE/PR/LR全线AI升级，离线Remove Tool+重制Roto 🇨🇳",u:"https://www.adobe.com/cn/creativecloud.html",r:3},
  {n:"Omnify AI",c:"创意智能体",d:"清华团队多Agent创作平台，剧本→分镜→配音全链路 🇨🇳",u:"https://omnifyai.cn/",r:3},
  {n:"Arrow 1.0",c:"图像生成",d:"全球首款SVG原生AI模型，矢量图无限缩放+逐层编辑",u:"https://app.quiver.ai/explore",r:3},
  {n:"Meta Edits",c:"视频编辑",d:"Meta视频编辑App桌面版+AI创作助手上线",u:"https://creators.instagram.com/edits",r:3}
];

// Sort by rating descending (same rating → alphabetical)
TOOLS.sort((a,b)=>(b.r||0)-(a.r||0)||a.n.localeCompare(b.n));

const allCats = [...new Set(TOOLS.map(t=>t.c))];
const grid=document.getElementById('grid'),search=document.getElementById('search'),count=document.getElementById('toolCount');
count.textContent = TOOLS.length;
let activeCat=null;
document.getElementById('filters').innerHTML='<span class="filter-pill active" data-cat="">全部</span>'+allCats.map(c=>`<span class="filter-pill" data-cat="${c}">${c}</span>`).join('');

function render(fc,q){
  q=q.toLowerCase();let s=0;grid.innerHTML='';
  TOOLS.forEach(t=>{
    if((!fc||t.c===fc)&&(!q||t.n.toLowerCase().includes(q)||t.d.toLowerCase().includes(q))){
      const l=t.u?`<a href="${t.u}" target="_blank" rel="noopener" class="card-link">🔗 访问官网</a>`:`<span class="card-link disabled">暂无链接</span>`;
      const stars='★'.repeat(t.r||0)+'☆'.repeat(5-(t.r||0));
      s++;grid.innerHTML+=`<div class="card"><div class="card-name">${t.n}</div><div class="card-stars">${stars}</div><div class="card-cat">${t.c}</div><div class="card-desc">${t.d}</div>${l}</div>`}
  });count.textContent=s;
}
render(null,'');
document.getElementById('filters').addEventListener('click',e=>{
  if(!e.target.classList.contains('filter-pill'))return;
  document.querySelectorAll('.filter-pill').forEach(p=>p.classList.remove('active'));
  e.target.classList.add('active');activeCat=e.target.dataset.cat||null;render(activeCat,search.value);
});
search.addEventListener('input',()=>render(activeCat,search.value));
</script>
</body>
</html>
