// Sort by rating descending (same rating → alphabetical)
TOOLS.sort((a,b)=>(b.r||0)-(a.r||0)||a.n.localeCompare(b.n));

let showFree = 0;
const allCats = [...new Set(TOOLS.map(t=>t.c))];
const grid=document.getElementById('grid'),search=document.getElementById('search'),count=document.getElementById('toolCount'),freeBtn=document.getElementById('freeBtn');
count.textContent = TOOLS.length;
let activeCat=null;
document.getElementById('filters').innerHTML='<span class="filter-pill active" data-cat="">全部</span>'+allCats.map(c=>`<span class="filter-pill" data-cat="${c}">${c}</span>`).join('');

function render(fc,q,free){
  q=q.toLowerCase();let s=0;grid.innerHTML='';
  TOOLS.forEach(t=>{
    if(free && !t.f)return;
    if((!fc||t.c===fc)&&(!q||t.n.toLowerCase().includes(q)||t.d.toLowerCase().includes(q))){
      const l=(t.u?`<a href="${t.u}" target="_blank" rel="noopener" class="card-link">🔗 官网</a>`:'')+(t.u&&t.g?' ':'')+(t.g?`<a href="${t.g}" target="_blank" rel="noopener" class="card-link">📦 开源</a>`:'')||'<span class="card-link disabled">暂无链接</span>';
      const stars='★'.repeat(t.r||0)+'☆'.repeat(5-(t.r||0));
      const dm=(t.u&&t.u.startsWith('http')?new URL(t.u).hostname:t.g?new URL(t.g).hostname:'');
      const c=['#07c160','#ff6b6b','#4ecdc4','#45b7d1','#f39c12','#9b59b6','#e74c3c','#1abc9c','#3498db','#e67e22','#2ecc71','#e91e63'][t.n.length%12];
      const ic=dm?`<img class="card-icon" src="https://${dm}/favicon.ico" onerror="this.style.display='none';this.nextSibling.style.display='inline-flex'" loading="lazy"><span class="card-icon-fallback" style="background:${c};display:none">${t.n[0]}</span>`:`<span class="card-icon-fallback" style="background:${c}">${t.n[0]}</span>`;
      s++;grid.innerHTML+=`<div class="card">${t.v?'<span class="card-vpn">🪜</span>':''}<div class="card-name">${t.n}${ic}</div>${t.q?`<div class="card-quota">${t.q}</div>`:''}<div class="card-stars">${stars} · ${t.re}</div><div class="card-cat">${t.c}</div><div class="card-desc">${t.d}</div>${l}</div>`}
  });count.textContent=s;
}
render(null,'',0);
document.getElementById('filters').addEventListener('click',e=>{
  if(!e.target.classList.contains('filter-pill'))return;
  document.querySelectorAll('.filter-pill').forEach(p=>p.classList.remove('active'));
  e.target.classList.add('active');activeCat=e.target.dataset.cat||null;render(activeCat,search.value,showFree);
});
freeBtn.addEventListener('click',()=>{
  showFree=!showFree;
  freeBtn.classList.toggle('active',showFree);
  document.querySelectorAll('.filter-pill').forEach(p=>p.classList.remove('active'));
  activeCat=null;
  render(null,search.value,showFree);
});
search.addEventListener('input',()=>render(activeCat,search.value));
